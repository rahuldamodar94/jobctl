# Curated role templates (COMMITTED — community value).
#
# Each entry is a ready-to-use role search spanning the SOFTWARE INDUSTRY, all
# roles — engineering AND data/product/design/growth/sales/people roles at tech
# companies. The onboarding wizard + Settings let you PICK a template; it
# prefills a role in profile/roles.yaml that you then edit. Keywords and weights
# are starting points — yours to tune.
#
# Shape == roles.yaml entries, plus two picker-only fields:
#   group       — section the picker lists it under
#   description — one-line summary shown in the picker
#
# For NON-engineering roles, `must_have_stack` means "core skills/tools the JD
# must mention" — the same keyword gate, generalized beyond a tech stack.
#
# Matcher notes (so edits behave):
#   - title_keywords are SUBSTRING + word-order sensitive ("backend engineer"
#     won't match "Backend Software Engineer" — list the variants you want).
#   - must_have_stack / nice_to_have are word-boundary matched, so prefer
#     unambiguous terms ("golang" over bare "go", "node.js" over "node").
#     Real audit learnings (do not regress): never bare "go" (use "golang"),
#     never bare "r"/"c"; "java" is word-boundary-safe and won't hit
#     "javascript", but list both when you want both; guard ambiguous title
#     tokens ("sde" vs "sdet", "research", "sre", "site reliability").
#   - exclude_if_primary: language/stack terms that, when PRIMARY in a JD,
#     exclude it (forgiven on polyglot titles that also name a must-have term).
#
# CONTRADICTION RULE (enforced by role-templates.test.ts + the audit script):
#   must_have_stack ∩ exclude_if_primary = ∅, and title_keywords ∩ title_exclude
#   = ∅. A term you REQUIRE can never also be a term you EXCLUDE. Pick a stance:
#   GENERIC roles take many languages → broad must_have_stack, empty/minimal
#   exclude_if_primary (only genuinely off-target signals). SPECIALIZED roles
#   (e.g. a TypeScript/Node backend) → narrow must_have_stack + the OTHER
#   languages in exclude_if_primary.
#
# Refining a template = a PR (shared value). Your personal edits live in
# profile/roles.yaml, never here.

