# =============================================================================
# COMMUNITY COMPANY REGISTRY (committed — PRs welcome)
#
# Companies whose ATS job boards this tool can pull directly via a public API
# (Greenhouse / Lever / Ashby / Recruitee). Every entry is live-verified — the
# ATS API returned real job JSON. Re-verify when adding; URL patterns are in
# CLAUDE.md. Companies on other ATSes (Workday/iCIMS/custom portals) and known
# same-name false positives live in config/companies-unsupported.md.
#
# Which slices YOU scrape is chosen in profile/profile.yaml:
#   companies:
#     domains: [ai-ml, fintech, ...]  # pick ids from config/domains.yaml
#     include: [...]                  # your own additions (any ATS URL)
#     exclude: [...]                  # registry names to skip
#
# Tags are the ids in config/domains.yaml. Entries are grouped below by their
# PRIMARY (first) domain; a company may carry secondary tags too. Global, with
# India / MENA representation noted via tags + the company set.
# =============================================================================

