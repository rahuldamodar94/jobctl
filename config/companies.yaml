# =============================================================================
# COMMUNITY COMPANY REGISTRY (committed — PRs welcome)
#
# Companies whose ATS job boards this tool can pull directly. Every entry was
# live-verified (the ATS API returned real job JSON) on 2026-06-06.
# Re-verify when adding: the API URL patterns are in CLAUDE.md.
#
# Which slices YOU scrape is chosen in profile/profile.yaml:
#   companies:
#     domains: [ai-ml, fintech, ...]  # pick ids from config/domains.yaml
#     include: [...]                  # your own additions
#     exclude: [...]                  # registry names to skip
#
# Domain tags are the ids defined in config/domains.yaml (the canonical
# software-industry vocabulary):
#   ai-ml · fintech · crypto · cloud-infra · devtools · security · data ·
#   saas · gaming · consumer · ecommerce · healthtech
# The registry covers all 12 domains (live-verified). It's deepest in crypto /
# cloud-infra / saas / devtools / fintech / ai-ml / data / security, with growing
# healthtech / consumer / ecommerce / gaming coverage — community PRs welcome.
#
# Companies we COULDN'T support yet (other ATSs, custom portals) and known
# same-name false positives: see config/companies-unsupported.md
# =============================================================================

