# Default job-categorization rules (committed). First match in `order` wins.
# These ids align with the domain vocabulary in config/domains.yaml. Only the
# domains with reliable keyword signal are classified here today; everything else
# falls back to `saas` (general software). Override per-user by placing a
# categories.yaml in your profile/ dir.

order: [ai-ml, crypto, fintech, saas]

# Category assigned when nothing in `keywords` matches (general software).
fallback: saas

keywords:
  ai-ml:
    - llm
    - openai
    - anthropic
    - claude
    - gen ai
    - generative ai
    - mcp
    - ml engineer
    - ai agent
    - ai engineer
    - gpt
    # NOTE: bare "machine learning" removed — a fintech JD mentioning an ML
    # fraud model is not an AI company (corpus audit: mislabeled Razorpay etc.)
  crypto:
    # protocol-specific terms — bare "liquidity"/"yield"/"swap" are everyday
    # TradFi vocabulary and mislabeled hundreds of payments jobs (2026-06-07 audit)
    - defi
    - lending protocol
    - dex
    - perpetuals
    - staking
    - cross-chain
    - amm
    - yield farming
    - liquidity pool
    - liquidity mining
    - web3
    - blockchain
    - ethereum
    - evm
    - smart contract
    - on-chain
    - onchain
    - indexer
    - l2
    - rollup
    - crypto
    - solana
    - wallet
  fintech:
    - payments
    - banking
    - stablecoin
    - on-ramp
    - kyc
    - settlement
    - treasury
    - card issuing
    - neobank
    - remittance
    - ledger
