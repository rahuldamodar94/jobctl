# Default job-categorization rules (committed). First match in `order` wins, so
# the list is ordered most-distinctive → most-general. These ids are the domain
# vocabulary in config/domains.yaml. Keywords are DISTINCTIVE on purpose — bare
# generic terms ("liquidity", "data", "cloud") mislabel hundreds of jobs.
# Anything unmatched falls back to `saas` (general software).
# Override per-user by placing a categories.yaml in your profile/ dir.

# `saas` is last (most-general) and has no keyword list — jobs reach it only via
# the fallback below. It MUST appear in `order` because fallback ∈ order is a
# loader invariant (categoriesSchema).
order: [crypto, gaming, healthtech, security, data, ai-ml, devtools, cloud-infra, fintech, ecommerce, consumer, saas]

fallback: saas

keywords:
  crypto:
    # protocol-specific — bare "liquidity"/"yield"/"swap" are everyday TradFi
    # vocabulary and mislabel payments jobs as crypto
    - defi
    - lending protocol
    - dex
    - perpetuals
    - staking
    - cross-chain
    - amm
    - yield farming
    - liquidity pool
    - liquidity mining
    - web3
    - blockchain
    - ethereum
    - evm
    - smart contract
    - on-chain
    - onchain
    - indexer
    - rollup
    - crypto
    - solana
    - wallet
  gaming:
    - game engine
    - unreal engine
    - gameplay
    - game designer
    - gamedev
    - game studio
    - multiplayer
    - level design
  healthtech:
    - ehr
    - electronic health record
    - hipaa
    - telehealth
    - digital health
    - fhir
    - clinical data
    - medtech
    - patient data
  security:
    - cybersecurity
    - infosec
    - appsec
    - siem
    - edr
    - xdr
    - threat detection
    - threat intelligence
    - penetration testing
    - pentest
    - vulnerability management
    - zero trust
    - security operations
    - malware
  data:
    - data engineer
    - data platform
    - data warehouse
    - data pipeline
    - analytics engineer
    - snowflake
    - databricks
    - dbt
    - apache spark
    - business intelligence
  ai-ml:
    - llm
    - openai
    - anthropic
    - claude
    - gen ai
    - generative ai
    - mcp
    - ml engineer
    - ai agent
    - ai engineer
    - gpt
    # NOTE: bare "machine learning" removed — a fintech JD mentioning an ML
    # fraud model is not an AI company (corpus audit: mislabeled Razorpay etc.)
  devtools:
    - developer tools
    - developer experience
    - devex
    - ci/cd pipeline
    - api platform
    - sdk
    - observability
  cloud-infra:
