services:
  jobctl:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data          # SQLite + WAL sidecars (rw)
      - ./profile:/app/profile:ro # personal config (read-only)
    restart: unless-stopped
    # LINUX NOTE: the bind-mounted ./data is owned by YOUR host user, while the
    # container runs as its own non-root user — if SQLite fails with
    # SQLITE_READONLY/cannot-open, uncomment and set to your host uid:gid
    # (`id -u`:`id -g`). macOS/Windows Docker Desktop handles this for you.
    # user: "1000:1000"

# Daily usage:
#   docker compose up -d                      → UI at http://localhost:3000
#   docker compose exec jobctl npm run scrape   → CLI scrape (or use the UI button)
